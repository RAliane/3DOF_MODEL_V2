version: '3.8'

services:
  app:
    image: 3dof-model:v2
    build: .
    networks:
      - app-net
    volumes:
      - ./data:/app/data
    environment:
      - DIRECTUS_URL=http://db:8055
      - PROMETHEUS_URL=http://prometheus:9090
    depends_on:
      - db
      - prometheus

  db:
    image: directus/directus:latest
    networks:
      - db-net
    volumes:
      - ./data:/directus/data
    environment:
      - DB_CLIENT=sqlite3
      - DB_FILENAME=/directus/data/data.db
      - ADMIN_EMAIL=admin@example.com
      - ADMIN_PASSWORD=admin
    ports:
      - "8055:8055"

  prometheus:
    image: prom/prometheus:latest
    networks:
      - app-net
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    networks:
      - app-net
    volumes:
      - grafana-storage:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  nginx:
    image: nginx:latest
    networks:
      - nginx-net
      - app-net
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf
      - ./data/logs/nginx:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app

  fail2ban:
    image: crazymax/fail2ban:latest
    networks:
      - nginx-net
    volumes:
      - ./data/logs/nginx:/var/log/nginx
      - ./config/fail2ban:/etc/fail2ban
    cap_add:
      - NET_ADMIN
      - NET_RAW

networks:
  app-net:
    internal: true
  db-net:
    internal: true
  nginx-net:
    driver: bridge

volumes:
  grafana-storage: